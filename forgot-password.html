<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Store — Восстановление пароля</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/ui.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="authPage authPage--compact forgotPage">
  <header class="topbar">
    <div class="container topbar__inner authTopbar">
      <a class="brand" href="index.html"><span class="brand__dot"></span><span class="brand__name">Store</span></a>
      <nav class="authTopbar__nav">
        <a class="topNav__a" href="login.html">Вход</a>
        <a class="topNav__a" href="register.html">Регистрация</a>
      </nav>
    </div>
  </header>

  <main class="container authShell authScene" data-auth-scene>
    <section class="authCard authCard--solo" data-auth-panel="card">
      <div class="authCard__head authReveal authCard__head--center" data-auth-reveal>
        <div>
          <h1 class="authTitle authTitle--main">Восстановление пароля</h1>
        </div>
      </div>
      <p class="authPageNote authReveal" data-auth-reveal>Укажи email аккаунта. Мы отправим ссылку для сброса пароля.</p>
      <div class="field authReveal" data-auth-reveal>
        <div class="label">Email</div>
        <input class="input" id="forgotEmail" type="email" placeholder="example@mail.com" autocomplete="email" />
      </div>
      <div class="row authActions authReveal" data-auth-reveal>
        <button class="btn btn--primary authSubmit" id="forgotSubmit" type="button">Отправить ссылку</button>
        <a class="btn btn--ghost authSubmit" href="login.html">Назад ко входу</a>
      </div>
      <div class="msg authMsg authReveal" data-auth-reveal id="forgotMsg"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="js/pages/auth-animations.js"></script>
  <script src="js/pages/auth-ui.js"></script>
</body>
</html>
