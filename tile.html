<!doctype html>
<html lang="ru">
<head>

  <link rel="stylesheet" href="css/base.css" />

<body>

<div id="headerMount" data-header="catalog"></div>
<div id="subbarMount" data-subbar="catalog"></div>

<main class="container catalogPage">

      <div class="hero__title" id="tileTitle">Плитка</div>
      <div class="hero__sub" id="tileSub">Загрузка…</div>

  </section>
</main>
