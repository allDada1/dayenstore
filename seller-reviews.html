<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Store — Отзывы магазина</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/ui.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/seller.css" />
</head>
<body class="sellerReviewsPage">
<div id="headerMount" data-header="seller"></div>
<div id="subbarMount" data-subbar="none"></div>
<main class="container page">
  <div class="admWrap">
    <div class="admCard sellerReviewsCard">
      <div class="sellerReviewsHero">
        <div>
          <h1 class="admTitle" id="reviewsTitle">Отзывы магазина</h1>
          <div class="muted sellerReviewsMeta" id="reviewsMeta">Загрузка…</div>
        </div>
        <a class="btn btn--ghost sellerReviewsBack" id="backToStore" href="#">← Назад в магазин</a>
      </div>
      <div class="sellerReviewsListWrap">
        <div class="list sellerReviewList" id="reviewsList"></div>
      </div>
      <div class="sellerReviewsPagination" id="reviewsPagination"></div>
      <div class="empty" id="reviewsEmpty" hidden>
        <div class="empty__title">Отзывов пока нет</div>
        <div class="empty__text">Когда покупатели начнут оставлять отзывы на товары этого магазина, они появятся здесь.</div>
      </div>
    </div>
  </div>
</main>
<script src="js/shared/utils/helpers.js"></script>
<script src="js/shared/api/client.js"></script>
<script src="js/core/auth.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/ui/ui.js"></script>
<script src="js/components/header/header-auth.js"></script>
<script src="js/components/header/header-ui.js"></script>
<script src="js/components/header/header.js"></script>
<script src="js/features/seller/seller-store.helpers.js"></script>
<script src="js/features/seller/seller-reviews.js"></script>
</body>
</html>
