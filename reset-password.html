<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Store — Новый пароль</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/ui.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="authPage authPage--compact forgotPage">
  <header class="topbar">
    <div class="container topbar__inner authTopbar">
      <a class="brand" href="index.html">
        <span class="brand__dot"></span>
        <span class="brand__name">Store</span>
      </a>

      <nav class="authTopbar__nav">
        <a class="topNav__a" href="login.html">Вход</a>
        <a class="topNav__a" href="register.html">Регистрация</a>
      </nav>
    </div>
  </header>

  <main class="container authShell authScene" data-auth-scene>
    <section class="authCard authCard--solo" data-auth-panel="card">
      <div class="authCard__head authReveal authCard__head--center" data-auth-reveal>
        <div>
          <h1 class="authTitle authTitle--main">Новый пароль</h1>
        </div>
      </div>

      <div class="field authReveal" data-auth-reveal>
        <div class="label">Новый пароль</div>
        <div class="authPasswordWrap">
          <input
            id="resetPassword"
            class="input authPasswordInput"
            type="password"
            placeholder="Введите новый пароль"
            autocomplete="new-password"
          />
          <button
            class="authPasswordToggle"
            type="button"
            data-toggle-password="#resetPassword"
            aria-label="Показать пароль"
            aria-pressed="false"
          >
            <span class="authEye authEye--closed" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                <path d="M4 20 20 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="authEye authEye--open" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </span>
          </button>
        </div>
      </div>

      <div class="field authReveal" data-auth-reveal>
        <div class="label">Подтвердите пароль</div>
        <div class="authPasswordWrap">
          <input
            id="resetPasswordConfirm"
            class="input authPasswordInput"
            type="password"
            placeholder="Повторите новый пароль"
            autocomplete="new-password"
          />
          <button
            class="authPasswordToggle"
            type="button"
            data-toggle-password="#resetPasswordConfirm"
            aria-label="Показать пароль"
            aria-pressed="false"
          >
            <span class="authEye authEye--closed" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                <path d="M4 20 20 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="authEye authEye--open" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </span>
          </button>
        </div>
      </div>

      <div class="row authActions authReveal" data-auth-reveal>
        <button class="btn btn--primary authSubmit" id="resetSubmit" type="button">Сохранить новый пароль</button>
        <a class="btn btn--ghost authSubmit" href="login.html">Назад ко входу</a>
      </div>

      <div class="msg authMsg authReveal" data-auth-reveal id="resetMsg"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="js/pages/auth-animations.js"></script>
  <script src="js/pages/auth-ui.js"></script>
</body>
</html>
